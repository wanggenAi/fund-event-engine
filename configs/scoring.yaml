# final_score = source_weight * freshness_weight * event_strength * relevance * direction_sign * confidence

source_weight:
  official: 1.00
  exchange: 0.95
  fund_company: 0.90
  listed_company: 0.85
  mainstream_media: 0.75
  industry_media: 0.65
  community_forum: 0.35
  self_media: 0.30
  other: 0.45

freshness_weight:
  within_3d: 1.00
  within_7d: 0.90
  within_14d: 0.75
  within_30d: 0.55
  older_than_30d: 0.25
  unknown: 0.35

event_strength_weight:
  formal_announcement: 1.00
  confirmed_report: 0.80
  secondary_report: 0.55
  rumor: 0.30

stale_penalty:
  older_than_window: 0.55
  date_uncertain: 0.70
  community_unconfirmed: 0.70

evidence_mode_weight:
  direct: 1.00
  proxy: 0.78

proxy_controls:
  confidence_multiplier: 0.90
  max_proxy_share_in_main: 0.60
  auto_downgrade_strength_when_proxy_dominant: true
  downgrade_steps: 1

proxy_controls_by_fund_type:
  thematic_equity:
    confidence_multiplier: 0.88
    max_proxy_share_in_main: 0.35
    auto_downgrade_strength_when_proxy_dominant: true
    downgrade_steps: 1
  broad_equity:
    confidence_multiplier: 0.92
    max_proxy_share_in_main: 0.60
    auto_downgrade_strength_when_proxy_dominant: true
    downgrade_steps: 1
  bond:
    confidence_multiplier: 0.92
    max_proxy_share_in_main: 0.65
    auto_downgrade_strength_when_proxy_dominant: true
    downgrade_steps: 1
  gold:
    confidence_multiplier: 0.95
    max_proxy_share_in_main: 0.85
    auto_downgrade_strength_when_proxy_dominant: false
    downgrade_steps: 0

proxy_controls_by_fund_code:
  "002963":
    confidence_multiplier: 0.95
    max_proxy_share_in_main: 0.85
    auto_downgrade_strength_when_proxy_dominant: false
    downgrade_steps: 0

relevance_thresholds:
  ignore_below: 0.25
  weak_below: 0.45
  medium_below: 0.70
  strong_at_least: 0.70

final_score_bands:
  strong_bullish: 0.65
  bullish: 0.12
  neutral_low: -0.12
  neutral_high: 0.12
  bearish: -0.12
  strong_bearish: -0.65

horizon_adjustments:
  "3d":
    freshness_multiplier: 1.20
    contradiction_penalty: 0.20
  "2w":
    freshness_multiplier: 1.00
    contradiction_penalty: 0.15
  "3m":
    freshness_multiplier: 0.80
    contradiction_penalty: 0.10

source_feedback:
  enabled: true
  min_multiplier: 0.85
  max_multiplier: 1.15
  prior_multiplier_default: 1.00
  prior_multiplier_by_source_tier:
    A: 1.03
    B: 1.00
    C: 0.97
    D: 0.94
  prior_multiplier_by_source_category:
    authoritative_data: 1.03
    top_tier_media: 1.00
    specialist_research: 0.97
    sentiment_sources: 0.94
  prior_multiplier_by_source_name: {}
  posterior_blend_weight: 0.65
  use_prior_only: false
  source_multiplier_by_name: {}
  source_multiplier_by_fund_type: {}
  source_multiplier_by_horizon: {}
  source_multiplier_by_fund_type_horizon: {}
